<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeWise — Pro Trader Onboarding Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-dark, #0f172a);
            color: var(--text-light, #f8fafc);
            font-family: 'Inter', sans-serif;
            text-align: center;
        }
        .coming-soon-container {
            max-width: 600px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon {
            width: 40px;
            height: 40px;
            color: #10B981;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #10B981, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.1rem;
            color: #94A3B8;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #f8fafc;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            border-color: #f8fafc;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <div class="icon-container">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        </div>
        <h1>Pro Trader Onboarding is Coming Soon</h1>
        <p>We are currently finalizing the KYC and regulatory vetting flows for Pro Traders. Once the integration with Cashfree Payments is complete, you will be able to complete your profile and start monetizing your trade analysis.</p>
        <a href="role-select.html" class="btn-outline">Return to Role Selection</a>
    </div>

</body>
</html>
