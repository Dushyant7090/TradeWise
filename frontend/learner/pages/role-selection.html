<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Choose Your Role</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/globals.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../css/learner.css" />
</head>
<body>
  <div class="auth-page" style="align-items:flex-start;padding-top:5vh;">
    <div class="auth-bg-glow auth-bg-glow-1"></div>

    <div style="width:100%;max-width:680px;margin:0 auto;padding:var(--space-6);">
      <a href="../../index.html" class="auth-logo" style="justify-content:center;margin-bottom:var(--space-8);">
        <span>Trade<span class="accent">Wise</span></span>
      </a>

      <h1 style="text-align:center;font-size:var(--text-3xl);font-weight:800;letter-spacing:-.03em;margin-bottom:var(--space-3);">
        How would you like to use TradeWise?
      </h1>
      <p style="text-align:center;color:var(--text-muted);font-size:var(--text-base);margin-bottom:var(--space-8);">
        Pick your role — you can explore both but each has distinct features.
      </p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);">
        <!-- Learner (Public Trader) card -->
        <button class="role-card" id="learner-btn" type="button" aria-label="Join as Public Trader (Learner)">
          <div class="role-icon" style="background:rgba(16,185,129,.12);color:#10B981;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
            </svg>
          </div>
          <h2 class="role-title">Public Trader</h2>
          <p class="role-desc">
            Learn from professional traders. Browse real trade ideas, use 7 free credits to unlock analysis,
            and subscribe to your favourite pro-traders.
          </p>
          <ul class="role-perks">
            <li>✦ 7 free credits on signup</li>
            <li>✦ Browse live trade ideas</li>
            <li>✦ Subscribe to pro-traders</li>
            <li>✦ Track your learning journey</li>
          </ul>
        </button>

        <!-- Pro Trader card -->
        <button class="role-card" id="protrader-btn" type="button" aria-label="Join as Pro Trader">
          <div class="role-icon" style="background:rgba(59,130,246,.12);color:#3B82F6;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <h2 class="role-title">Pro Trader</h2>
          <p class="role-desc">
            Share your trading expertise. Post trade ideas, build a subscriber base, and earn
            from your analysis with a verified account.
          </p>
          <ul class="role-perks">
            <li>✦ Post unlimited trade ideas</li>
            <li>✦ Earn from subscribers</li>
            <li>✦ 90% revenue share</li>
            <li>✦ Performance analytics</li>
          </ul>
        </button>
      </div>

      <p style="text-align:center;margin-top:var(--space-6);font-size:var(--text-sm);color:var(--text-muted);">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <style>
    .role-card {
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      text-align: left;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .role-card:hover {
      border-color: var(--color-primary-glow);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }
    .role-icon {
      width: 60px;
      height: 60px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .role-title {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .role-desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .role-perks {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .role-perks li {
      font-size: var(--text-sm);
      color: var(--text-muted);
    }
    @media (max-width:600px) {
      div[style*="grid-template-columns"] {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

  <script type="module">
    document.getElementById('learner-btn').addEventListener('click', () => {
      window.location.href = 'register.html';
    });
    document.getElementById('protrader-btn').addEventListener('click', () => {
      window.location.href = '/frontend/pages/register.html';
    });
  </script>
</body>
</html>
