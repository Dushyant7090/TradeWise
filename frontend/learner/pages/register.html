<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/globals.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../css/learner.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-glow auth-bg-glow-1"></div>
    <div class="auth-bg-glow auth-bg-glow-2"></div>

    <div class="auth-container">
      <a href="../../index.html" class="auth-logo">
        <span>Trade<span class="accent">Wise</span></span>
      </a>

      <div class="auth-card">
        <h1 class="auth-title">Create an account</h1>
        <p class="auth-subtitle">Join TradeWise and get 7 free credits to start learning</p>

        <div id="register-alert" class="alert alert-error hidden" role="alert" aria-live="polite"></div>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email address <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="input" placeholder="you@example.com"
              autocomplete="email" required />
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" class="input"
                placeholder="Min 8 characters" autocomplete="new-password" required />
              <button type="button" class="btn btn-ghost btn-icon input-icon right" id="toggle-pw"
                aria-label="Toggle password visibility">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <!-- Strength meter -->
            <div style="margin-top:.5rem;">
              <div style="height:4px;background:var(--border-subtle);border-radius:99px;overflow:hidden;">
                <div id="strength-fill" style="height:100%;width:0;border-radius:99px;transition:width .3s,background .3s;"></div>
              </div>
              <span id="strength-hint" style="font-size:.75rem;color:var(--text-muted);">Min 8 characters required</span>
            </div>
            <span class="form-error" id="password-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password <span class="required">*</span></label>
            <input type="password" id="confirm-password" name="confirm-password" class="input"
              placeholder="Repeat your password" autocomplete="new-password" required />
            <span class="form-error" id="confirm-error"></span>
          </div>

          <div class="form-group">
            <label class="flex items-center gap-2" style="cursor:pointer;font-size:.875rem;color:var(--text-secondary);">
              <input type="checkbox" id="terms" required style="width:16px;height:16px;" />
              I agree to the <a href="#" target="_blank">Terms &amp; Conditions</a>
            </label>
            <span class="form-error" id="terms-error"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
            <span class="btn-text">Create Account — Get 7 Free Credits</span>
            <div class="btn-spinner spinner" aria-hidden="true"></div>
          </button>
        </form>

        <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import Auth from '../js/auth.js';
    import { validateEmail, validatePassword } from '../js/utils.js';

    if (Auth.isAuthenticated()) window.location.href = 'dashboard.html';

    // Password toggle
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    // Strength meter
    document.getElementById('password').addEventListener('input', () => {
      const pw = document.getElementById('password').value;
      const fill = document.getElementById('strength-fill');
      const hint = document.getElementById('strength-hint');
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const pct = (score / 5) * 100;
      const colors = ['#EF4444', '#EF4444', '#F59E0B', '#3B82F6', '#3B82F6', '#10B981'];
      fill.style.width = pct + '%';
      fill.style.background = colors[score];
      hint.textContent = ['', 'Very Weak', 'Weak', 'Fair', 'Good', 'Strong'][score] || 'Very Weak';
      hint.style.color = colors[score];
    });

    // Real-time validation
    document.getElementById('email').addEventListener('blur', () => {
      const err = validateEmail(document.getElementById('email').value.trim());
      document.getElementById('email-error').textContent = err;
      document.getElementById('email').classList.toggle('input-error', !!err);
    });

    document.getElementById('confirm-password').addEventListener('input', () => {
      const match = document.getElementById('confirm-password').value !== document.getElementById('password').value;
      const err = document.getElementById('confirm-password').value && match ? 'Passwords do not match.' : '';
      document.getElementById('confirm-error').textContent = err;
    });

    function setLoading(btn, on) { btn.classList.toggle('loading', on); btn.disabled = on; }

    const registerAlert = document.getElementById('register-alert');

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      registerAlert.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const terms = document.getElementById('terms').checked;
      let valid = true;

      const emailErr = validateEmail(email);
      if (emailErr) { document.getElementById('email-error').textContent = emailErr; document.getElementById('email').classList.add('input-error'); valid = false; }

      const pwErr = validatePassword(password);
      if (pwErr) { document.getElementById('password-error').textContent = pwErr; document.getElementById('password').classList.add('input-error'); valid = false; }

      if (password !== confirm) { document.getElementById('confirm-error').textContent = 'Passwords do not match.'; valid = false; }
      if (!terms) { document.getElementById('terms-error').textContent = 'You must accept the terms.'; valid = false; }
      if (!valid) return;

      const btn = document.getElementById('register-btn');
      setLoading(btn, true);
      try {
        await Auth.register(email, password);
        registerAlert.textContent = '✓ Account created! You have 7 free credits. Redirecting…';
        registerAlert.className = 'alert alert-success';
        registerAlert.classList.remove('hidden');
        setTimeout(() => window.location.href = 'profile-setup.html', 1800);
      } catch (err) {
        registerAlert.textContent = err.message || 'Registration failed. Please try again.';
        registerAlert.className = 'alert alert-error';
        registerAlert.classList.remove('hidden');
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
