<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/globals.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../css/learner.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-glow auth-bg-glow-1"></div>
    <div class="auth-bg-glow auth-bg-glow-2"></div>

    <div class="auth-container">
      <a href="../../index.html" class="auth-logo">
        <span>Trade<span class="accent">Wise</span></span>
      </a>

      <div class="auth-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your TradeWise account</p>

        <div id="login-alert" class="alert alert-error hidden" role="alert" aria-live="polite"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email address <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="input" placeholder="you@example.com"
              autocomplete="email" required />
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" class="input"
                placeholder="Your password" autocomplete="current-password" required />
              <button type="button" class="btn btn-ghost btn-icon input-icon right" id="toggle-pw"
                aria-label="Toggle password visibility">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="form-error" id="password-error"></span>
          </div>

          <div class="flex items-center justify-between" style="margin-bottom:1.5rem;">
            <label class="flex items-center gap-2" style="cursor:pointer;font-size:.875rem;color:var(--text-secondary);">
              <input type="checkbox" id="remember-me" style="width:16px;height:16px;" />
              Remember me
            </label>
            <a href="#" id="forgot-link" style="font-size:.875rem;">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
            <span class="btn-text">Sign In</span>
            <div class="btn-spinner spinner" aria-hidden="true"></div>
          </button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgot-modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Reset Password</h2>
        <button class="modal-close" id="close-forgot" aria-label="Close">×</button>
      </div>
      <p style="font-size:.875rem;color:var(--text-muted);margin-bottom:1.5rem;">
        Enter your email and we'll send you a reset link.
      </p>
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="forgot-email">Email address</label>
          <input type="email" id="forgot-email" class="input" placeholder="you@example.com" />
          <span class="form-error" id="forgot-email-error"></span>
        </div>
        <div id="forgot-alert" class="alert hidden" role="alert"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancel-forgot">Cancel</button>
          <button type="submit" class="btn btn-primary" id="forgot-submit-btn">
            <span class="btn-text">Send Reset Link</span>
            <div class="btn-spinner spinner" aria-hidden="true"></div>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import Auth from '../js/auth.js';
    import { authAPI } from '../js/api.js';
    import { validateEmail } from '../js/utils.js';

    // Redirect if already logged in
    if (Auth.isAuthenticated()) window.location.href = 'dashboard.html';

    // ===== TOAST =====
    window.Toast = {
      show(msg, type = 'info') {
        const icons = {
          success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
          error:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
          info:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
          warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>`,
        };
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.innerHTML = `<div class="toast-icon">${icons[type]||icons.info}</div><div class="toast-content"><div class="toast-message">${msg}</div></div><button class="toast-dismiss" aria-label="Dismiss">×</button>`;
        c.appendChild(t);
        requestAnimationFrame(() => t.classList.add('show'));
        const dismiss = () => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); };
        t.querySelector('.toast-dismiss').addEventListener('click', dismiss);
        setTimeout(dismiss, 5000);
      }
    };

    function setLoading(btn, on) { btn.classList.toggle('loading', on); btn.disabled = on; }
    function showAlert(el, msg, type='error') { el.textContent = msg; el.className = `alert alert-${type}`; el.classList.remove('hidden'); }
    function hideAlert(el) { el.classList.add('hidden'); }

    // Password toggle
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    const form = document.getElementById('login-form');
    const loginAlert = document.getElementById('login-alert');
    const loginBtn = document.getElementById('login-btn');

    // Real-time validation
    document.getElementById('email').addEventListener('blur', () => {
      const err = validateEmail(document.getElementById('email').value.trim());
      document.getElementById('email-error').textContent = err;
      document.getElementById('email').classList.toggle('input-error', !!err);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(loginAlert);

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      const emailErr = validateEmail(email);
      if (emailErr) {
        document.getElementById('email-error').textContent = emailErr;
        document.getElementById('email').classList.add('input-error');
        valid = false;
      }
      if (!password) {
        document.getElementById('password-error').textContent = 'Password is required.';
        document.getElementById('password').classList.add('input-error');
        valid = false;
      }
      if (!valid) return;

      setLoading(loginBtn, true);
      try {
        const data = await Auth.login(email, password);
        // Route based on role
        const user = data.user || {};
        if (user.role === 'pro_trader') {
          window.location.href = '/frontend/pages/dashboard.html';
        } else if (!data.profile?.interests?.length) {
          window.location.href = 'profile-setup.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        showAlert(loginAlert, err.message || 'Login failed. Please try again.');
        setLoading(loginBtn, false);
      }
    });

    // Forgot password
    const forgotModal = document.getElementById('forgot-modal');
    document.getElementById('forgot-link').addEventListener('click', (e) => { e.preventDefault(); forgotModal.classList.add('active'); });
    document.getElementById('close-forgot').addEventListener('click', () => forgotModal.classList.remove('active'));
    document.getElementById('cancel-forgot').addEventListener('click', () => forgotModal.classList.remove('active'));

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const alert = document.getElementById('forgot-alert');
      const btn = document.getElementById('forgot-submit-btn');
      const err = validateEmail(email);
      if (err) { document.getElementById('forgot-email-error').textContent = err; return; }
      setLoading(btn, true);
      try {
        await fetch('/api/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email }) }).catch(() => {});
        alert.textContent = '✓ If that email is registered, a reset link has been sent.';
        alert.className = 'alert alert-success';
        alert.classList.remove('hidden');
      } catch {
        alert.textContent = 'Failed to send reset email.';
        alert.className = 'alert alert-error';
        alert.classList.remove('hidden');
      } finally { setLoading(btn, false); }
    });
  </script>
</body>
</html>
