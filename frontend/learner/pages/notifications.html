<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Notifications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/css/globals.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../../shared/css/pages.css" />
  <link rel="stylesheet" href="../css/learner.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo"><span>Trade<span style="color:var(--color-primary)">Wise</span></span></a>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="feed.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Trade Feed</a>
      <a href="my-history.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>My History</a>
      <a href="my-subscriptions.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Subscriptions</a>
      <a href="notifications.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notifications<span class="notif-badge hidden" id="sidebar-badge" style="position:static;margin-left:auto;">0</span></a>
      <a href="profile-settings.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    </nav>
      <a href="account-settings.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Settings</a>
    </nav>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <h1 class="topbar-title">Notifications</h1>
      </div>
      <div class="topbar-right">
        <a href="notification-preferences.html" class="btn btn-secondary btn-sm">⚙ Preferences</a>
        <button class="btn btn-ghost btn-sm" id="mark-all-btn" title="Mark all read">✓ Mark all read</button>
        <button class="btn btn-ghost btn-sm" id="clear-all-btn" title="Clear all" style="color:var(--color-danger);">🗑 Clear all</button>
        <button class="btn btn-secondary btn-sm" id="logout-btn">Sign Out</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <h2 class="page-title">Notifications</h2>
        <p class="page-subtitle" id="notif-summary">Loading notifications…</p>
      </div>

      <!-- Filter chips -->
      <div class="filter-bar" style="margin-bottom:var(--space-5);" id="notif-filter-bar">
        <button class="filter-chip active" data-nf="all">All</button>
        <button class="filter-chip" data-nf="unread">Unread</button>
        <button class="filter-chip" data-nf="new_trade">New Trades</button>
        <button class="filter-chip" data-nf="trade_closed">Closed</button>
        <button class="filter-chip" data-nf="subscription_expiring">Subscriptions</button>
        <button class="filter-chip" data-nf="flag_update">Reports</button>
      </div>

      <!-- Notification list -->
      <div class="notif-list" id="notif-list">
        <div class="spinner spinner-lg" style="margin:var(--space-8) auto;"></div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="notif-pagination"></div>
    </main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module">
  import Auth from '../js/auth.js';
  import { learnerNotificationsAPI } from '../js/api.js';
  import { timeAgo } from '../js/utils.js';
  import Realtime from '../js/realtime.js';

  if (!Auth.requireAuth()) throw new Error('Not authenticated');

  window.Toast = {
    show(msg,type='info'){const c=document.getElementById('toast-container'),t=document.createElement('div');t.className=`toast toast-${type}`;t.innerHTML=`<div class="toast-content"><div class="toast-message">${msg}</div></div><button class="toast-dismiss">×</button>`;c.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));const d=()=>{t.classList.remove('show');setTimeout(()=>t.remove(),350);};t.querySelector('.toast-dismiss').addEventListener('click',d);setTimeout(d,5000);}
  };

  const hamburger=document.getElementById('hamburger'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebar-overlay');
  hamburger.addEventListener('click',()=>{sidebar.classList.toggle('open');overlay.classList.toggle('active');});
  overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('active');});
  document.getElementById('logout-btn').addEventListener('click',()=>Auth.logout());

  const NOTIF_ICONS = {
    new_trade:               { cls: 'notif-type-new_trade',             icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>` },
    trade_closed:            { cls: 'notif-type-trade_closed',          icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>` },
    trade_status_update:     { cls: 'notif-type-trade_closed',          icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>` },
    flag_update:             { cls: 'notif-type-flag_update',           icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>` },
    subscription_expiring:   { cls: 'notif-type-subscription_expiring', icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>` },
    payment_success:         { cls: 'notif-type-new_trade',             icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>` },
    comment_reply:           { cls: 'notif-type-subscriber_alert',      icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>` },
  };

  const DEFAULT_ICON = { cls: 'notif-type-new_trade', icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>` };

  let currentFilter = 'all';
  let currentPage = 1;
  let totalPages = 1;

  async function loadNotifications() {
    const list = document.getElementById('notif-list');
    list.innerHTML = '<div class="spinner spinner-lg" style="margin:var(--space-8) auto;"></div>';
    try {
      let params = `?page=${currentPage}&limit=20`;
      if (currentFilter !== 'all') params += `&type=${currentFilter}`;
      if (currentFilter === 'unread') { params = `?page=${currentPage}&limit=20&read=false`; }

      const data = await learnerNotificationsAPI.getAll(params);
      const notifs = data.data || [];
      const unreadCount = data.unread_count || notifs.filter(n=>!n.is_read).length;
      totalPages = data.total_pages || 1;

      document.getElementById('notif-summary').textContent = `${data.total || notifs.length} notifications · ${unreadCount} unread`;
      updateBadges(unreadCount);

      if (!notifs.length) {
        list.innerHTML = `<div class="empty-state"><svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><h3 class="empty-state-title">No notifications</h3><p class="empty-state-text">You're all caught up!</p></div>`;
        document.getElementById('notif-pagination').innerHTML = '';
        return;
      }

      list.innerHTML = notifs.map(n => notifHTML(n)).join('');
      renderPagination();
      attachNotifActions();
    } catch (err) {
      list.innerHTML = `<div class="empty-state"><p style="color:var(--color-danger);">${err.message||'Failed to load notifications.'}</p></div>`;
    }
  }

  function notifHTML(n) {
    const typeInfo = NOTIF_ICONS[n.type] || DEFAULT_ICON;
    return `<div class="notif-item ${!n.is_read?'notif-item-unread':''}" data-id="${n.id}">
      <div class="notif-icon-wrap ${typeInfo.cls}">${typeInfo.icon}</div>
      <div class="notif-body">
        <div class="notif-title">${n.title||'Notification'}</div>
        <div class="notif-message">${n.message||n.body||''}</div>
        <div class="notif-time">${timeAgo(n.created_at)}</div>
      </div>
      <div class="notif-actions">
        ${!n.is_read ? `<button class="btn btn-ghost btn-sm mark-read-btn" data-id="${n.id}" title="Mark as read" style="font-size:.75rem;">✓</button>` : ''}
        <button class="btn btn-ghost btn-sm delete-notif-btn" data-id="${n.id}" title="Delete" style="font-size:.75rem;color:var(--color-danger);">🗑</button>
      </div>
    </div>`;
  }

  function attachNotifActions() {
    document.querySelectorAll('.mark-read-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          await learnerNotificationsAPI.markRead(btn.dataset.id);
          const item = btn.closest('.notif-item');
          item.classList.remove('notif-item-unread');
          btn.remove();
          Toast.show('Marked as read', 'success');
        } catch (err) { Toast.show(err.message||'Failed.', 'error'); }
      });
    });

    document.querySelectorAll('.delete-notif-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          await learnerNotificationsAPI.delete(btn.dataset.id);
          btn.closest('.notif-item').remove();
          Toast.show('Notification deleted.', 'success');
        } catch (err) { Toast.show(err.message||'Failed.', 'error'); }
      });
    });

    // Click to mark as read + navigate
    document.querySelectorAll('.notif-item').forEach(item => {
      item.addEventListener('click', async () => {
        if (item.classList.contains('notif-item-unread')) {
          try { await learnerNotificationsAPI.markRead(item.dataset.id); item.classList.remove('notif-item-unread'); } catch { /* silent */ }
        }
      });
    });
  }

  function renderPagination() {
    const wrap = document.getElementById('notif-pagination');
    if (totalPages <= 1) { wrap.innerHTML=''; return; }
    let html = `<button class="page-btn" id="prev-notif" ${currentPage===1?'disabled':''}>← Prev</button>`;
    for (let i=Math.max(1,currentPage-2);i<=Math.min(totalPages,currentPage+2);i++) html+=`<button class="page-btn ${i===currentPage?'active':''}" data-p="${i}">${i}</button>`;
    html+=`<button class="page-btn" id="next-notif" ${currentPage===totalPages?'disabled':''}>Next →</button>`;
    wrap.innerHTML=html;
    wrap.querySelectorAll('[data-p]').forEach(b=>b.addEventListener('click',()=>{currentPage=parseInt(b.dataset.p);loadNotifications();window.scrollTo(0,0);}));
    document.getElementById('prev-notif')?.addEventListener('click',()=>{if(currentPage>1){currentPage--;loadNotifications();window.scrollTo(0,0);}});
    document.getElementById('next-notif')?.addEventListener('click',()=>{if(currentPage<totalPages){currentPage++;loadNotifications();window.scrollTo(0,0);}});
  }

  function updateBadges(count) {
    const sb = document.getElementById('sidebar-badge');
    if (count > 0) { sb.textContent=count; sb.classList.remove('hidden'); }
    else sb.classList.add('hidden');
  }

  // Filter chips
  document.querySelectorAll('#notif-filter-bar .filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#notif-filter-bar .filter-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.nf;
      currentPage = 1;
      loadNotifications();
    });
  });

  // Mark all
  document.getElementById('mark-all-btn').addEventListener('click', async () => {
    try {
      await learnerNotificationsAPI.clearAll(); // or markAllRead endpoint
      Toast.show('All notifications marked as read.', 'success');
      loadNotifications();
    } catch (err) { Toast.show(err.message||'Failed.', 'error'); }
  });

  // Clear all
  document.getElementById('clear-all-btn').addEventListener('click', async () => {
    if (!confirm('Clear all notifications? This cannot be undone.')) return;
    try {
      await learnerNotificationsAPI.clearAll();
      Toast.show('All notifications cleared.', 'success');
      loadNotifications();
    } catch (err) { Toast.show(err.message||'Failed.', 'error'); }
  });

  // Realtime
  const user = Auth.getCurrentUser();
  if (user?.id) {
    const sbUrl=window.TW_SUPABASE_URL||'',sbKey=window.TW_SUPABASE_ANON_KEY||'';
    Realtime.init(sbUrl, sbKey);
    Realtime.subscribeToNotifications(user.id, {
      onInsert(n) {
        Toast.show(n.title || 'New notification', 'info');
        loadNotifications();
      }
    });
  }

  loadNotifications();
</script>
</body>
</html>
