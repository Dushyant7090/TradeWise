<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <!--
    verify.js MUST remain the first script tag.
    It runs a synchronous IIFE that hides the page and validates the
    access key before anything else is parsed or rendered.
  -->
  <script src="verify.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../../shared/js/theme.js?v=global-theme-1"></script>
  <title>TradeWise - Admin Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/css/auth.css" />
  <style>
    .admin-auth-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      padding: 6px 14px;
      border: 1px solid rgba(16, 185, 129, 0.24);
      border-radius: var(--radius-pill);
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .admin-auth-note {
      margin-top: 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .admin-auth-message {
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-bg">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
  </div>

  <div class="auth-wrapper">
    <a href="../../landing-page.html" class="auth-logo">
      <img src="../../shared/assets/logo.svg" alt="TradeWise" class="auth-logo-icon">
    </a>

    <div class="auth-container">
      <div class="admin-auth-badge">Admin Portal</div>
      <h1 class="auth-title">Log in to TradeWise</h1>
      <p class="auth-subtitle">Secure access for authorized administrators.</p>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="admin@tradewise.com"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              id="password"
              type="password"
              placeholder="--------"
              required
              autocomplete="current-password"
            >
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <svg id="eyeIcon" class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMsg" class="auth-message error admin-auth-message" role="alert" aria-live="polite"></div>

        <button type="submit" class="auth-submit-btn ready" id="loginBtn">
          <span id="loginBtnText">Log In</span>
          <span id="loginSpinner" class="btn-loader" style="display:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path
                d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
            </svg>
          </span>
        </button>
      </form>

      <p class="admin-auth-note">Authorized personnel only.</p>
    </div>
  </div>

  <script>
    'use strict';

    var frontendAnchor = '/frontend/';
    var pathname = window.location.pathname;
    var anchorIndex = pathname.indexOf(frontendAnchor);
    var FRONTEND_BASE = anchorIndex === -1
      ? ''
      : pathname.slice(0, anchorIndex + frontendAnchor.length - 1);

    function frontendPath(pathFromFrontendRoot) {
      return FRONTEND_BASE + pathFromFrontendRoot;
    }

    var API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5000/api'
      : '/api';

    // If a valid admin session is already present, forward to the dashboard.
    (function checkExisting() {
      var token = localStorage.getItem('tw_admin_token');
      var profile = null;
      try { profile = JSON.parse(localStorage.getItem('tw_admin_profile')); } catch (e) {}
      if (token && profile && profile.role === 'admin') {
        window.location.replace(frontendPath('/admin/dashboard.html'));
      }
    })();

    var form = document.getElementById('loginForm');
    var errorMsg = document.getElementById('errorMsg');
    var loginBtn = document.getElementById('loginBtn');
    var loginBtnText = document.getElementById('loginBtnText');
    var loginSpinner = document.getElementById('loginSpinner');
    var togglePassword = document.getElementById('togglePassword');
    var passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      var isText = passwordInput.type === 'text';
      passwordInput.type = isText ? 'password' : 'text';
      document.getElementById('eyeIcon').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);
      fetch(API_BASE + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password }),
      })
        .then(function (res) {
          return res.json().then(function (data) { return { ok: res.ok, data: data }; });
        })
        .then(function (result) {
          if (!result.ok) {
            showError(result.data.error || 'Login failed. Please check your credentials.');
            return;
          }
          var data = result.data;
          if (!data.profile || data.profile.role !== 'admin') {
            // Wrong role: redirect to 404, never back to login.
            window.location.replace(frontendPath('/404.html'));
            return;
          }
          localStorage.setItem('tw_admin_token', data.access_token);
          localStorage.setItem('tw_admin_user', JSON.stringify(data.user));
          localStorage.setItem('tw_admin_profile', JSON.stringify(data.profile));
          window.location.replace(frontendPath('/admin/dashboard.html'));
        })
        .catch(function () {
          showError('Unable to connect to the server. Please try again.');
        })
        .finally(function () {
          setLoading(false);
        });
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtnText.style.display = loading ? 'none' : 'inline';
      loginSpinner.style.display = loading ? 'inline-block' : 'none';
    }
  </script>
</body>
</html>
