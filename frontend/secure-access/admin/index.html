<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    verify.js MUST remain the first script tag.
    It runs a synchronous IIFE that hides the page and validates the
    access key before anything else is parsed or rendered.
  -->
  <script src="verify.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 1rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1.25rem; }
    .logo-icon { font-size: 1.5rem; }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 9999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.75rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem; }
    .input-wrap { position: relative; }
    .form-input {
      width: 100%;
      padding: 0.65rem 1rem;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 0.5rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #3b82f6; }
    .toggle-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
    }
    .toggle-btn svg { width: 18px; height: 18px; }
    .alert {
      padding: 0.65rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn:hover:not(:disabled) { background: #2563eb; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: #4a5568; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span>TradeWise</span>
      </div>
      <span class="badge">Admin Portal</span>
    </div>

    <h1>Admin Sign In</h1>
    <p class="subtitle">Secure access to the TradeWise Admin Dashboard</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="admin@tradewise.com"
          required
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
          <button type="button" class="toggle-btn" id="togglePassword" aria-label="Toggle password visibility">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="errorMsg" class="alert" style="display:none;"></div>

      <button type="submit" class="btn" id="loginBtn">
        <span id="loginBtnText">Sign In</span>
        <span id="loginSpinner" class="spinner" style="display:none;"></span>
      </button>
    </form>

    <p class="footer">&copy; 2025 TradeWise. Authorized personnel only.</p>
  </div>

  <script>
    'use strict';

    var API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5000/api'
      : '/api';

    // If a valid admin session is already present, forward to the dashboard.
    (function checkExisting() {
      var token = localStorage.getItem('tw_admin_token');
      var profile = null;
      try { profile = JSON.parse(localStorage.getItem('tw_admin_profile')); } catch (e) {}
      if (token && profile && profile.role === 'admin') {
        window.location.replace('/frontend/admin/dashboard.html');
      }
    })();

    var form = document.getElementById('loginForm');
    var errorMsg = document.getElementById('errorMsg');
    var loginBtn = document.getElementById('loginBtn');
    var loginBtnText = document.getElementById('loginBtnText');
    var loginSpinner = document.getElementById('loginSpinner');
    var togglePassword = document.getElementById('togglePassword');
    var passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      var isText = passwordInput.type === 'text';
      passwordInput.type = isText ? 'password' : 'text';
      document.getElementById('eyeIcon').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);
      fetch(API_BASE + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password }),
      })
        .then(function (res) {
          return res.json().then(function (data) { return { ok: res.ok, data: data }; });
        })
        .then(function (result) {
          if (!result.ok) {
            showError(result.data.error || 'Login failed. Please check your credentials.');
            return;
          }
          var data = result.data;
          if (!data.profile || data.profile.role !== 'admin') {
            // Wrong role — redirect to 404, never back to login.
            window.location.replace('/frontend/404.html');
            return;
          }
          localStorage.setItem('tw_admin_token', data.access_token);
          localStorage.setItem('tw_admin_user', JSON.stringify(data.user));
          localStorage.setItem('tw_admin_profile', JSON.stringify(data.profile));
          window.location.replace('/frontend/admin/dashboard.html');
        })
        .catch(function () {
          showError('Unable to connect to the server. Please try again.');
        })
        .finally(function () {
          setLoading(false);
        });
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtnText.style.display = loading ? 'none' : 'inline';
      loginSpinner.style.display = loading ? 'inline-block' : 'none';
    }
  </script>
</body>
</html>
