<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Post Trade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/css/globals.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../../shared/css/pages.css" />
  <link rel="stylesheet" href="../../shared/css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar (shared) -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <a href="dashboard.html" class="sidebar-logo"><span>TradeWise Pro</span></a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="post-trade.html" class="nav-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Post Trade
        </a>
        <a href="active-trades.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 21V9"/></svg>
          Active Trades
        </a>
        <a href="analytics.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Analytics
        </a>
        <a href="earnings.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          Earnings
        </a>
        <a href="notifications.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          Notifications
        </a>
        <a href="profile-settings.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
      </nav>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

    <div class="main-content">
      <header class="topbar" role="banner">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false"><span></span><span></span><span></span></button>
          <h1 class="topbar-title">Post New Trade</h1>
        </div>
        <div class="topbar-right">
          <button class="btn btn-icon btn-ghost notif-bell" id="notif-bell" aria-label="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notif-badge hidden" id="notif-badge">0</span>
          </button>
          <button class="btn btn-secondary btn-sm" id="logout-btn">Sign Out</button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <h2 class="page-title">Post New Trade</h2>
          <p class="page-subtitle">Share your technical analysis with subscribers</p>
        </div>

        <div id="form-alert" class="alert hidden" role="alert" aria-live="polite"></div>

        <form id="trade-form" novalidate>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">

            <!-- Symbol -->
            <div class="form-group">
              <label class="form-label" for="symbol">Symbol <span class="required">*</span></label>
              <input type="text" id="symbol" name="symbol" class="input" placeholder="e.g. RELIANCE, NIFTY50" autocomplete="off" required />
              <span class="form-error" id="symbol-error"></span>
            </div>

            <!-- Direction -->
            <div class="form-group">
              <label class="form-label">Direction <span class="required">*</span></label>
              <div style="display: flex; gap: 1rem; margin-top: 0.25rem;">
                <label class="radio-item" style="flex: 1; padding: 10px 16px; border: 2px solid var(--border-subtle); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s; justify-content: center;" id="buy-label">
                  <input type="radio" name="direction" value="buy" id="dir-buy" required style="display:none;" />
                  <span style="font-weight: 600; color: var(--color-buy);">▲ BUY</span>
                </label>
                <label class="radio-item" style="flex: 1; padding: 10px 16px; border: 2px solid var(--border-subtle); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s; justify-content: center;" id="sell-label">
                  <input type="radio" name="direction" value="sell" id="dir-sell" required style="display:none;" />
                  <span style="font-weight: 600; color: var(--color-sell);">▼ SELL</span>
                </label>
              </div>
              <span class="form-error" id="direction-error"></span>
            </div>

            <!-- Entry Price -->
            <div class="form-group">
              <label class="form-label" for="entry-price">Entry Price <span class="required">*</span></label>
              <input type="number" id="entry-price" name="entry_price" class="input" placeholder="0.00" min="0.01" step="0.01" required />
              <span class="form-error" id="entry-error"></span>
            </div>

            <!-- Stop Loss -->
            <div class="form-group">
              <label class="form-label" for="stop-loss">Stop-Loss Price <span class="required">*</span></label>
              <input type="number" id="stop-loss" name="stop_loss_price" class="input" placeholder="0.00" min="0.01" step="0.01" required />
              <span class="form-error" id="sl-error"></span>
            </div>

            <!-- Target Price -->
            <div class="form-group">
              <label class="form-label" for="target-price">Target Price <span class="required">*</span></label>
              <input type="number" id="target-price" name="target_price" class="input" placeholder="0.00" min="0.01" step="0.01" required />
              <span class="form-error" id="target-error"></span>
            </div>

            <!-- RRR Display -->
            <div class="form-group">
              <label class="form-label">Risk-Reward Ratio (auto-calculated)</label>
              <div class="rrr-display" id="rrr-display" role="status" aria-live="polite">
                <div class="rrr-value" id="rrr-value">—</div>
                <div class="rrr-label">RRR = (Target − Entry) ÷ (Entry − SL)</div>
              </div>
            </div>

          </div>

          <!-- Technical Rationale -->
          <div class="form-group" style="margin-top: 0.5rem;">
            <label class="form-label" for="rationale">Technical Rationale <span class="required">*</span></label>
            <textarea id="rationale" name="technical_rationale" class="input" rows="5" placeholder="Explain your analysis... (min 50 words, max 500 words)" required></textarea>
            <div class="flex justify-between" style="margin-top: 0.25rem;">
              <span class="form-error" id="rationale-error"></span>
              <span class="word-counter" id="word-counter" aria-live="polite">0 / 500 words</span>
            </div>
          </div>

          <!-- Chart Image Upload -->
          <div class="form-group">
            <label class="form-label">Chart Image</label>
            <div class="file-dropzone" id="dropzone" role="button" tabindex="0" aria-label="Upload chart image">
              <input type="file" id="chart-image" name="chart_image" accept="image/jpeg,image/png,image/gif" aria-describedby="file-hint" />
              <div class="dropzone-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </div>
              <div class="dropzone-text"><strong>Click to upload</strong> or drag and drop</div>
              <div class="dropzone-hint" id="file-hint">JPG, PNG, GIF — max 5MB</div>
            </div>
            <div class="file-preview hidden" id="file-preview">
              <img id="preview-img" src="" alt="Chart preview" />
              <button type="button" class="file-preview-remove" id="remove-file" aria-label="Remove file">×</button>
            </div>
            <span class="form-error" id="file-error"></span>
          </div>

          <!-- Submit -->
          <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
              <span class="btn-text">Post Trade</span>
              <div class="btn-spinner spinner" aria-hidden="true"></div>
            </button>
            <a href="active-trades.html" class="btn btn-secondary btn-lg">Cancel</a>
          </div>
        </form>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import Auth from '../js/auth.js';
    import { tradesAPI } from '../js/api.js';
    import { calculateRRR, wordCount, validateRequired, validatePositiveNumber, validateFileSize, validateFileType } from '../js/utils.js';
    import App from '../js/main.js';

    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    window.Toast = {
      show(msg, type = 'info') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.innerHTML = `<div class="toast-content"><div class="toast-message">${msg}</div></div><button class="toast-dismiss">×</button>`;
        c.appendChild(t);
        requestAnimationFrame(() => t.classList.add('show'));
        const d = () => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); };
        t.querySelector('.toast-dismiss').addEventListener('click', d);
        setTimeout(d, 4000);
      }
    };

    App.init();

    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    document.getElementById('hamburger').addEventListener('click', () => {
      const open = sidebar.classList.toggle('open');
      overlay.classList.toggle('active', open);
    });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
    document.getElementById('logout-btn').addEventListener('click', () => Auth.logout());

    // Direction selection styling
    const buyLabel = document.getElementById('buy-label');
    const sellLabel = document.getElementById('sell-label');
    document.getElementById('dir-buy').addEventListener('change', () => {
      buyLabel.style.borderColor = 'var(--color-buy)';
      buyLabel.style.background = 'var(--color-buy-bg)';
      sellLabel.style.borderColor = 'var(--border-subtle)';
      sellLabel.style.background = 'transparent';
      recalcRRR();
    });
    document.getElementById('dir-sell').addEventListener('change', () => {
      sellLabel.style.borderColor = 'var(--color-sell)';
      sellLabel.style.background = 'var(--color-sell-bg)';
      buyLabel.style.borderColor = 'var(--border-subtle)';
      buyLabel.style.background = 'transparent';
      recalcRRR();
    });

    // RRR calculation
    function getDirection() {
      const checked = document.querySelector('input[name="direction"]:checked');
      return checked ? checked.value : null;
    }

    function recalcRRR() {
      const dir = getDirection();
      const entry = document.getElementById('entry-price').value;
      const sl = document.getElementById('stop-loss').value;
      const target = document.getElementById('target-price').value;
      const rrr = calculateRRR(dir, entry, sl, target);
      const rrEl = document.getElementById('rrr-value');
      if (rrr !== null) {
        rrEl.textContent = rrr.toFixed(2);
        rrEl.className = 'rrr-value ' + (rrr >= 1.5 ? 'good' : rrr >= 1 ? 'medium' : 'poor');
      } else {
        rrEl.textContent = '—';
        rrEl.className = 'rrr-value';
      }
    }

    ['entry-price', 'stop-loss', 'target-price'].forEach(id => {
      document.getElementById(id).addEventListener('input', recalcRRR);
    });

    // Word counter
    document.getElementById('rationale').addEventListener('input', (e) => {
      const count = wordCount(e.target.value);
      const counter = document.getElementById('word-counter');
      counter.textContent = `${count} / 500 words`;
      counter.className = 'word-counter' + (count < 50 ? ' error' : count > 500 ? ' warning' : '');
    });

    // File upload
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('chart-image');
    let uploadedImageUrl = '';

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      const sizeErr = validateFileSize(file, 5);
      const typeErr = validateFileType(file, ['image/jpeg', 'image/png', 'image/gif']);
      const errEl = document.getElementById('file-error');
      if (sizeErr || typeErr) { errEl.textContent = sizeErr || typeErr; return; }
      errEl.textContent = '';
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('preview-img').src = e.target.result;
        document.getElementById('file-preview').classList.remove('hidden');
        dropzone.classList.add('hidden');
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('remove-file').addEventListener('click', () => {
      fileInput.value = '';
      uploadedImageUrl = '';
      document.getElementById('file-preview').classList.add('hidden');
      dropzone.classList.remove('hidden');
    });

    // Form validation
    function validateForm() {
      let valid = true;
      const setErr = (id, msg) => {
        const el = document.getElementById(id);
        if (el) { el.textContent = msg; }
        if (msg) valid = false;
      };

      setErr('symbol-error', validateRequired(document.getElementById('symbol').value, 'Symbol'));
      if (!getDirection()) { setErr('direction-error', 'Please select a direction.'); valid = false; }
      else setErr('direction-error', '');

      const entry = parseFloat(document.getElementById('entry-price').value);
      const sl = parseFloat(document.getElementById('stop-loss').value);
      const target = parseFloat(document.getElementById('target-price').value);
      const dir = getDirection();

      setErr('entry-error', validatePositiveNumber(entry, 'Entry price'));

      if (!sl || sl <= 0) { setErr('sl-error', 'Stop-loss price is required.'); valid = false; }
      else if (dir === 'buy' && sl >= entry) { setErr('sl-error', 'For BUY: Stop-loss must be below entry.'); valid = false; }
      else if (dir === 'sell' && sl <= entry) { setErr('sl-error', 'For SELL: Stop-loss must be above entry.'); valid = false; }
      else setErr('sl-error', '');

      if (!target || target <= 0) { setErr('target-error', 'Target price is required.'); valid = false; }
      else if (dir === 'buy' && target <= entry) { setErr('target-error', 'For BUY: Target must be above entry.'); valid = false; }
      else if (dir === 'sell' && target >= entry) { setErr('target-error', 'For SELL: Target must be below entry.'); valid = false; }
      else setErr('target-error', '');

      const words = wordCount(document.getElementById('rationale').value);
      if (words < 50) { setErr('rationale-error', 'Minimum 50 words required.'); valid = false; }
      else if (words > 500) { setErr('rationale-error', 'Maximum 500 words allowed.'); valid = false; }
      else setErr('rationale-error', '');

      return valid;
    }

    // Upload chart image to backend then submit
    async function getChartImageUrl() {
      const file = fileInput.files[0];
      if (!file) return '';
      const formData = new FormData();
      formData.append('file', file);
      try {
        const res = await fetch('/api/pro-trader/uploads/chart', {
          method: 'POST',
          headers: { Authorization: `Bearer ${localStorage.getItem('tw_jwt_token')}` },
          body: formData,
        });
        const data = await res.json();
        return data.url || data.image_url || '';
      } catch {
        return '';
      }
    }

    // Form submission
    document.getElementById('trade-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('form-alert').classList.add('hidden');

      if (!validateForm()) return;

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const chartImageUrl = await getChartImageUrl();
        const payload = {
          symbol: document.getElementById('symbol').value.trim().toUpperCase(),
          direction: getDirection(),
          entry_price: parseFloat(document.getElementById('entry-price').value),
          stop_loss_price: parseFloat(document.getElementById('stop-loss').value),
          target_price: parseFloat(document.getElementById('target-price').value),
          rrr: calculateRRR(getDirection(), document.getElementById('entry-price').value, document.getElementById('stop-loss').value, document.getElementById('target-price').value),
          technical_rationale: document.getElementById('rationale').value.trim(),
          chart_image_url: chartImageUrl,
        };

        await tradesAPI.create(payload);
        window.Toast.show('Trade posted successfully! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'active-trades.html', 1500);
      } catch (err) {
        const alertEl = document.getElementById('form-alert');
        alertEl.textContent = err.message || 'Failed to post trade. Please try again.';
        alertEl.className = 'alert alert-error';
        alertEl.classList.remove('hidden');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
