<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-glow auth-bg-glow-1"></div>
    <div class="auth-bg-glow auth-bg-glow-2"></div>

    <div class="auth-container">
      <a href="../index.html" class="auth-logo">
        <span>TradeWise</span>
      </a>

      <div class="auth-card">
        <h1 class="auth-title">Create an account</h1>
        <p class="auth-subtitle">Join TradeWise as a Pro Trader</p>

        <div id="register-alert" class="alert alert-error hidden" role="alert" aria-live="polite"></div>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email address <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="input" placeholder="you@example.com" autocomplete="email" required />
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" class="input" placeholder="Min 8 characters" autocomplete="new-password" required />
              <button type="button" class="btn btn-ghost btn-icon input-icon right" id="toggle-pw" aria-label="Show password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="strength-meter" id="strength-meter">
              <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
              <span class="strength-hint" id="strength-hint">Min 8 characters required</span>
            </div>
            <span class="form-error" id="password-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password <span class="required">*</span></label>
            <input type="password" id="confirm-password" name="confirm-password" class="input" placeholder="Repeat your password" autocomplete="new-password" required />
            <span class="form-error" id="confirm-error"></span>
          </div>

          <div class="form-group">
            <label class="checkbox-item">
              <input type="checkbox" id="terms" required />
              <span class="checkbox-label">I agree to the <a href="#" target="_blank">Terms & Conditions</a> and <a href="#" target="_blank">Privacy Policy</a></span>
            </label>
            <span class="form-error" id="terms-error"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
            <span class="btn-text">Create Account</span>
            <div class="btn-spinner spinner" aria-hidden="true"></div>
          </button>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import Auth from '../js/auth.js';
    import { validateEmail, validatePassword } from '../js/utils.js';

    if (Auth.isAuthenticated()) window.location.href = 'dashboard.html';

    const form = document.getElementById('register-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const registerBtn = document.getElementById('register-btn');
    const registerAlert = document.getElementById('register-alert');

    // Password toggle
    document.getElementById('toggle-pw').addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    });

    // Password strength
    passwordInput.addEventListener('input', () => {
      const pw = passwordInput.value;
      const fill = document.getElementById('strength-fill');
      const hint = document.getElementById('strength-hint');
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const pct = (score / 5) * 100;
      const colors = ['#EF4444', '#EF4444', '#F59E0B', '#3B82F6', '#3B82F6', '#10B981'];
      fill.style.width = pct + '%';
      fill.style.background = colors[score];
      hint.textContent = score < 5 ? `Strength: ${['Very Weak','Weak','Fair','Good','Strong','Very Strong'][score]}` : '✓ Strong password';
      hint.style.color = colors[score];
    });

    // Real-time validation
    emailInput.addEventListener('blur', () => {
      const err = validateEmail(emailInput.value.trim());
      document.getElementById('email-error').textContent = err;
      emailInput.classList.toggle('input-error', !!err);
    });

    confirmInput.addEventListener('input', () => {
      const err = confirmInput.value && confirmInput.value !== passwordInput.value ? 'Passwords do not match.' : '';
      document.getElementById('confirm-error').textContent = err;
      confirmInput.classList.toggle('input-error', !!err);
    });

    function setLoading(btn, loading) {
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    function showAlert(msg, type = 'error') {
      registerAlert.textContent = msg;
      registerAlert.className = `alert alert-${type}`;
      registerAlert.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      registerAlert.classList.add('hidden');

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirm = confirmInput.value;
      const terms = document.getElementById('terms').checked;

      let valid = true;

      const emailErr = validateEmail(email);
      if (emailErr) { document.getElementById('email-error').textContent = emailErr; emailInput.classList.add('input-error'); valid = false; }

      const pwErr = validatePassword(password);
      if (pwErr) { document.getElementById('password-error').textContent = pwErr; passwordInput.classList.add('input-error'); valid = false; }

      if (password !== confirm) { document.getElementById('confirm-error').textContent = 'Passwords do not match.'; confirmInput.classList.add('input-error'); valid = false; }

      if (!terms) { document.getElementById('terms-error').textContent = 'You must accept the terms.'; valid = false; }

      if (!valid) return;

      setLoading(registerBtn, true);
      try {
        await Auth.register(email, password);
        showAlert('Account created! Please check your email for verification, then sign in.', 'success');
        setTimeout(() => window.location.href = 'login.html', 3000);
      } catch (err) {
        showAlert(err.message || 'Registration failed. Please try again.');
      } finally {
        setLoading(registerBtn, false);
      }
    });
  </script>
</body>
</html>
