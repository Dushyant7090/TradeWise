<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-glow auth-bg-glow-1"></div>
    <div class="auth-bg-glow auth-bg-glow-2"></div>

    <div class="auth-container">
      <a href="../index.html" class="auth-logo">
        <span>TradeWise</span>
      </a>

      <div class="auth-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your Pro Trader account</p>

        <div id="login-alert" class="alert alert-error hidden" role="alert" aria-live="polite"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email address <span class="required">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              class="input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="input"
                placeholder="Your password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="btn btn-ghost btn-icon input-icon right" id="toggle-password" aria-label="Show password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="password-error"></span>
          </div>

          <div class="flex items-center justify-between" style="margin-bottom: 1.5rem;">
            <label class="checkbox-item">
              <input type="checkbox" id="remember-me" />
              <span class="checkbox-label">Remember me</span>
            </label>
            <a href="#" id="forgot-link" style="font-size: 0.875rem;">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
            <span class="btn-text">Sign In</span>
            <div class="btn-spinner spinner" aria-hidden="true"></div>
          </button>
        </form>

        <div class="auth-divider">or</div>

        <button class="btn btn-secondary btn-full" id="google-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgot-modal" role="dialog" aria-modal="true" aria-labelledby="forgot-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="forgot-title">Reset Password</h2>
        <button class="modal-close" id="close-forgot" aria-label="Close">×</button>
      </div>
      <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem;">Enter your email and we'll send a reset link.</p>
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="forgot-email">Email address</label>
          <input type="email" id="forgot-email" class="input" placeholder="you@example.com" />
          <span class="form-error" id="forgot-email-error"></span>
        </div>
        <div id="forgot-alert" class="alert hidden" role="alert"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancel-forgot">Cancel</button>
          <button type="submit" class="btn btn-primary" id="forgot-submit-btn">
            <span class="btn-text">Send Reset Link</span>
            <div class="btn-spinner spinner" aria-hidden="true"></div>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import Auth from '../js/auth.js';
    import { authAPI } from '../js/api.js';
    import { validateEmail } from '../js/utils.js';
    import { Toast } from '../js/main.js';

    // Redirect if already logged in
    if (Auth.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    // Init Toast
    document.addEventListener('DOMContentLoaded', () => {
      window.Toast = {
        show(msg, type) {
          const container = document.getElementById('toast-container');
          const t = document.createElement('div');
          t.className = `toast toast-${type}`;
          t.innerHTML = `<div class="toast-content"><div class="toast-message">${msg}</div></div><button class="toast-dismiss">×</button>`;
          container.appendChild(t);
          requestAnimationFrame(() => t.classList.add('show'));
          const dismiss = () => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); };
          t.querySelector('.toast-dismiss').addEventListener('click', dismiss);
          setTimeout(dismiss, 4000);
        }
      };
    });

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const loginAlert = document.getElementById('login-alert');

    // Password visibility toggle
    document.getElementById('toggle-password').addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
    });

    // Real-time validation
    emailInput.addEventListener('blur', () => {
      const err = validateEmail(emailInput.value.trim());
      const el = document.getElementById('email-error');
      el.textContent = err;
      emailInput.classList.toggle('input-error', !!err);
    });

    function showAlert(el, msg, type = 'error') {
      el.textContent = msg;
      el.className = `alert alert-${type}`;
      el.classList.remove('hidden');
    }

    function setLoading(btn, loading) {
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    // Login form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginAlert.classList.add('hidden');

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      const emailErr = validateEmail(email);
      if (emailErr) {
        document.getElementById('email-error').textContent = emailErr;
        emailInput.classList.add('input-error');
        return;
      }
      if (!password) {
        document.getElementById('password-error').textContent = 'Password is required.';
        passwordInput.classList.add('input-error');
        return;
      }

      setLoading(loginBtn, true);
      try {
        await Auth.login(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert(loginAlert, err.message || 'Login failed. Please try again.');
        setLoading(loginBtn, false);
      }
    });

    // Forgot password
    const forgotModal = document.getElementById('forgot-modal');
    document.getElementById('forgot-link').addEventListener('click', (e) => {
      e.preventDefault();
      forgotModal.classList.add('active');
    });
    document.getElementById('close-forgot').addEventListener('click', () => forgotModal.classList.remove('active'));
    document.getElementById('cancel-forgot').addEventListener('click', () => forgotModal.classList.remove('active'));

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const alert = document.getElementById('forgot-alert');
      const btn = document.getElementById('forgot-submit-btn');

      const err = validateEmail(email);
      if (err) {
        document.getElementById('forgot-email-error').textContent = err;
        return;
      }

      setLoading(btn, true);
      try {
        await authAPI.post?.('/auth/forgot-password', { email }).catch(() => {});
        alert.textContent = '✓ If that email is registered, a reset link has been sent.';
        alert.className = 'alert alert-success';
        alert.classList.remove('hidden');
      } catch {
        alert.textContent = 'Failed to send reset email. Please try again.';
        alert.className = 'alert alert-error';
        alert.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    });

    // Google OAuth (via Supabase or backend)
    document.getElementById('google-btn').addEventListener('click', () => {
      window.Toast?.show('Google OAuth requires Supabase configuration.', 'info');
    });
  </script>
</body>
</html>
