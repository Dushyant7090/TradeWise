<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeWise — Pro Trader</title>
  <meta name="description" content="TradeWise Pro Trader Dashboard" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/globals.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }
    .splash {
      text-align: center;
    }
    .splash h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #10B981, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .splash p {
      color: #737373;
      margin-bottom: 2rem;
    }
    .splash a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #10B981;
      color: #000;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .splash a:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="splash">
    <h1>TradeWise Pro</h1>
    <p>The professional trading dashboard for verified traders.</p>
    <a href="pages/login.html">
      Get Started →
    </a>
  </div>
  <script>
    // Auto-redirect if already authenticated
    const token = localStorage.getItem('tw_jwt_token');
    if (token) {
      window.location.href = 'pages/dashboard.html';
    }
  </script>
</body>
</html>
